<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻兽工坊与远征</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; overflow-x: hidden; }
        .resource-bar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; gap: 40px; z-index: 100; border-bottom: 2px solid #e94560; }
        .resource-item { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: bold; }
        .resource-icon { font-size: 24px; }
        .scene { display: none; padding-top: 80px; min-height: 100vh; }
        .scene.active { display: block; }
        #home-scene { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .home-title { text-align: center; font-size: 32px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(233, 69, 96, 0.5); }
        .grid-container { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .grid-label { text-align: center; margin-bottom: 15px; font-size: 14px; color: #aaa; }
        .beast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; }
        .grid-cell { aspect-ratio: 1; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; position: relative; }
        .grid-cell:hover { background: rgba(255,255,255,0.15); border-color: rgba(233, 69, 96, 0.5); }
        .grid-cell.drag-over { background: rgba(233, 69, 96, 0.3); border-color: #e94560; }
        .beast-card { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(233,69,96,0.3), rgba(0,212,170,0.3)); border-radius: 10px; font-size: 24px; cursor: grab; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .beast-card.dragging { opacity: 0.5; }
        .beast-star { position: absolute; top: 2px; right: 2px; font-size: 12px; color: gold; }
        .beast-element { position: absolute; bottom: 2px; left: 2px; font-size: 12px; }
        .element-Fire { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .element-Ice { background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .element-Thunder { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #333; }
        .element-Venom { background: linear-gradient(135deg, #55efc4, #00b894); }
        .workstation-container { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 100px; }
        .workstation-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .work-slot { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .work-slot.drag-over { background: rgba(0,212,170,0.3); border-color: #00d4aa; }
        .power-display { position: absolute; bottom: -25px; font-size: 12px; color: #00d4aa; }
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; gap: 20px; border-top: 2px solid #e94560; z-index: 100; }
        .btn { padding: 15px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #c73e54); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233, 69, 96, 0.5); }
        .btn-secondary { background: linear-gradient(135deg, #00d4aa, #00b894); color: white; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 212, 170, 0.5); }
        #battle-scene { padding: 20px; max-width: 800px; margin: 0 auto; }
        .battle-arena { display: flex; justify-content: space-between; align-items: center; padding: 40px 20px; background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 20px; }
        .combatant { text-align: center; width: 150px; }
        .combatant-avatar { font-size: 60px; margin-bottom: 10px; }
        .hp-bar-container { width: 100%; height: 20px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .hp-bar { height: 100%; background: linear-gradient(90deg, #00d4aa, #00b894); transition: width 0.3s; }
        .hp-bar.enemy { background: linear-gradient(90deg, #e94560, #c73e54); }
        .hp-text { font-size: 14px; margin-bottom: 5px; }
        .status-icons { display: flex; justify-content: center; gap: 5px; font-size: 18px; min-height: 24px; }
        .vs-text { font-size: 48px; font-weight: bold; color: #e94560; }
        .battle-log { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 14px; line-height: 1.8; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .log-entry:last-child { border-bottom: none; }
        .log-damage { color: #ff6b6b; } .log-heal { color: #00d4aa; } .log-skill { color: #74b9ff; } .log-status { color: #ffeaa7; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 30px; max-width: 600px; width: 90%; border: 2px solid #e94560; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-title { text-align: center; font-size: 24px; margin-bottom: 20px; color: #e94560; }
        .choice-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .choice-card { background: rgba(255,255,255,0.1); border: 2px solid transparent; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .choice-card:hover { border-color: #e94560; transform: translateY(-5px); }
        .choice-icon { font-size: 36px; margin-bottom: 10px; }
        .choice-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .choice-desc { font-size: 12px; color: #aaa; }
        .modal-actions { display: flex; justify-content: center; gap: 15px; }
        .result-modal { text-align: center; }
        .result-icon { font-size: 80px; margin-bottom: 20px; }
        .result-title { font-size: 32px; margin-bottom: 15px; }
        .result-rewards { font-size: 18px; color: #ffeaa7; margin-bottom: 20px; }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 15px 30px; border-radius: 30px; z-index: 2000; animation: fadeInOut 2s; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, -20px); } 20% { opacity: 1; transform: translate(-50%, 0); } 80% { opacity: 1; } 100% { opacity: 0; } }
        @media (max-width: 600px) { .beast-grid { gap: 5px; } .choice-container { grid-template-columns: 1fr; } .battle-arena { flex-direction: column; gap: 20px; } .vs-text { transform: rotate(90deg); } }
    </style>
</head>
<body>
    <div class="resource-bar">
        <div class="resource-item"><span class="resource-icon">💰</span><span id="gold-display">1000</span></div>
        <div class="resource-item"><span class="resource-icon">🎁</span><span id="chests-display">3</span></div>
    </div>

    <div id="home-scene" class="scene active">
        <h1 class="home-title">🏰 幻兽工坊</h1>
        <div class="grid-container">
            <div class="grid-label">📦 仓库 (拖拽合成: 3个相同幻兽可升星)</div>
            <div class="beast-grid" id="beast-grid"></div>
        </div>
        <div class="workstation-container">
            <div class="grid-label">⚒️ 打工槽位 (产出金币)</div>
            <div class="workstation-grid" id="workstation-grid"></div>
        </div>
    </div>

    <div id="battle-scene" class="scene">
        <div class="battle-arena">
            <div class="combatant">
                <div class="combatant-avatar" id="player-avatar">🧙‍♂️</div>
                <div class="hp-bar-container"><div class="hp-bar" id="player-hp-bar" style="width: 100%"></div></div>
                <div class="hp-text" id="player-hp-text">100/100</div>
                <div class="status-icons" id="player-status"></div>
            </div>
            <div class="vs-text">VS</div>
            <div class="combatant">
                <div class="combatant-avatar" id="enemy-avatar">👹</div>
                <div class="hp-bar-container"><div class="hp-bar enemy" id="enemy-hp-bar" style="width: 100%"></div></div>
                <div class="hp-text" id="enemy-hp-text">100/100</div>
                <div class="status-icons" id="enemy-status"></div>
            </div>
        </div>
        <div class="battle-log" id="battle-log"><div class="log-entry">战斗准备就绪...</div></div>
    </div>

    <div class="action-bar">
        <button class="btn btn-secondary" id="btn-open-chest">🎁 开宝箱</button>
        <button class="btn btn-primary" id="btn-start-run">⚔️ 开始远征</button>
    </div>

    <div class="modal-overlay" id="draft-modal">
        <div class="modal">
            <div class="modal-title">🎴 选择一个奖励</div>
            <div class="choice-container" id="draft-choices"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-reroll">🔄 刷新 (50金)</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal result-modal">
            <div class="result-icon" id="result-icon">🏆</div>
            <div class="result-title" id="result-title">胜利!</div>
            <div class="result-rewards" id="result-rewards">获得 3 个宝箱</div>
            <button class="btn btn-primary" id="btn-return-home">返回工坊</button>
        </div>
    </div>

    <script>
    (function() {
        const ELEMENT_ICONS = { 'Fire': '🔥', 'Ice': '❄️', 'Thunder': '⚡', 'Venom': '🧪' };
        const CLASS_ICONS = { 'Striker': '⚔️', 'Caster': '🧙‍♂️', 'Conjurer': '🔮' };
        const gameState = { gold: 1000, chests: 3, grid: new Array(25).fill(null), workstation: new Array(4).fill(null), inRun: false, currentStage: 0, player: null, enemy: null, draggedBeast: null, battleInterval: null };
        const els = { gold: document.getElementById('gold-display'), chests: document.getElementById('chests-display'), homeScene: document.getElementById('home-scene'), battleScene: document.getElementById('battle-scene'), beastGrid: document.getElementById('beast-grid'), workstationGrid: document.getElementById('workstation-grid'), draftModal: document.getElementById('draft-modal'), draftChoices: document.getElementById('draft-choices'), resultModal: document.getElementById('result-modal'), resultIcon: document.getElementById('result-icon'), resultTitle: document.getElementById('result-title'), resultRewards: document.getElementById('result-rewards'), battleLog: document.getElementById('battle-log'), playerAvatar: document.getElementById('player-avatar'), enemyAvatar: document.getElementById('enemy-avatar'), playerHpBar: document.getElementById('player-hp-bar'), playerHpText: document.getElementById('player-hp-text'), enemyHpBar: document.getElementById('enemy-hp-bar'), enemyHpText: document.getElementById('enemy-hp-text'), playerStatus: document.getElementById('player-status'), enemyStatus: document.getElementById('enemy-status') };
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
        function updateResources() { els.gold.textContent = gameState.gold; els.chests.textContent = gameState.chests; }
        function createBeastCard(beast, source, index) { const card = document.createElement('div'); card.className = `beast-card element-${beast.element}`; card.draggable = true; card.dataset.id = beast.id; card.dataset.source = source; card.dataset.index = index; card.innerHTML = `<span class="beast-star">${'⭐'.repeat(beast.starLevel)}</span><span class="beast-element">${ELEMENT_ICONS[beast.element]}</span><div style="font-size:28px">${CLASS_ICONS[beast.class]}</div><div style="font-size:10px">${beast.workPower || 5}⚡</div>`; card.addEventListener('dragstart', (e) => { gameState.draggedBeast = { id: beast.id, source, index, beast }; card.classList.add('dragging'); }); card.addEventListener('dragend', () => card.classList.remove('dragging')); return card; }
        function renderGrid() { els.beastGrid.innerHTML = ''; gameState.grid.forEach((beast, index) => { const cell = document.createElement('div'); cell.className = 'grid-cell'; cell.dataset.index = index; if (beast) cell.appendChild(createBeastCard(beast, 'grid', index)); cell.addEventListener('dragover', (e) => { e.preventDefault(); cell.classList.add('drag-over'); }); cell.addEventListener('dragleave', () => cell.classList.remove('drag-over')); cell.addEventListener('drop', handleDrop); els.beastGrid.appendChild(cell); }); }
        function renderWorkstation() { els.workstationGrid.innerHTML = ''; let totalPower = 0; gameState.workstation.forEach((beast, index) => { const slot = document.createElement('div'); slot.className = 'work-slot'; slot.dataset.index = index; slot.dataset.type = 'workstation'; if (beast) { slot.appendChild(createBeastCard(beast, 'workstation', index)); totalPower += (beast.starLevel || 1) * (beast.workPower || 5); } slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drag-over'); }); slot.addEventListener('dragleave', () => slot.classList.remove('drag-over')); slot.addEventListener('drop', handleDrop); els.workstationGrid.appendChild(slot); }); const powerDisplay = document.createElement('div'); powerDisplay.className = 'power-display'; powerDisplay.textContent = `产出: +${totalPower}/tick`; els.workstationGrid.appendChild(powerDisplay); }
        function handleDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (!gameState.draggedBeast) return; const targetType = e.currentTarget.dataset.type || 'grid'; const targetIndex = parseInt(e.currentTarget.dataset.index); const source = gameState.draggedBeast; const sourceBeast = source.source === 'grid' ? gameState.grid[source.index] : gameState.workstation[source.index]; const targetBeast = targetType === 'grid' ? gameState.grid[targetIndex] : gameState.workstation[targetIndex]; if (targetBeast && targetBeast.id !== sourceBeast.id) { if (tryMerge(sourceBeast, targetBeast, source, targetType, targetIndex)) return; } if (source.source === 'grid') gameState.grid[source.index] = null; else gameState.workstation[source.index] = null; if (targetType === 'grid') gameState.grid[targetIndex] = sourceBeast; else gameState.workstation[targetIndex] = sourceBeast; renderGrid(); renderWorkstation(); gameState.draggedBeast = null; }
        function tryMerge(source, target, sourceInfo, targetType, targetIndex) { if (source.class === target.class && source.element === target.element && source.starLevel === target.starLevel) { let third = null, thirdLoc = null; for (let i = 0; i < gameState.grid.length; i++) { const b = gameState.grid[i]; if (b && b.id !== source.id && b.id !== target.id && b.class === source.class && b.element === source.element && b.starLevel === source.starLevel) { third = b; thirdLoc = { type: 'grid', index: i }; break; } } if (!third) { for (let i = 0; i < gameState.workstation.length; i++) { const b = gameState.workstation[i]; if (b && b.id !== source.id && b.id !== target.id && b.class === source.class && b.element === source.element && b.starLevel === source.starLevel) { third = b; thirdLoc = { type: 'workstation', index: i }; break; } } } if (third) { const newBeast = { id: 'm' + Date.now(), class: source.class, element: source.element, starLevel: source.starLevel + 1, workPower: (source.workPower || 5) * 3 }; if (sourceInfo.source === 'grid') gameState.grid[sourceInfo.index] = null; else gameState.workstation[sourceInfo.index] = null; if (targetType === 'grid') gameState.grid[targetIndex] = newBeast; else gameState.workstation[targetIndex] = newBeast; if (thirdLoc.type === 'grid') gameState.grid[thirdLoc.index] = null; else gameState.workstation[thirdLoc.index] = null; showToast(`⭐ 合成成功! ${CLASS_ICONS[newBeast.class]} 升到 ${newBeast.starLevel}星!`); renderGrid(); renderWorkstation(); gameState.draggedBeast = null; return true; } } return false; }
        function addBeast(beast) { const emptyIndex = gameState.grid.findIndex(b => b === null); if (emptyIndex !== -1) gameState.grid[emptyIndex] = beast; else { const wsEmpty = gameState.workstation.findIndex(b => b === null); if (wsEmpty !== -1) gameState.workstation[wsEmpty] = beast; } }
        function openChest() { if (gameState.chests <= 0) { showToast('🎁 宝箱不足!'); return; } gameState.chests--; updateResources(); const elements = ['Fire', 'Ice', 'Thunder', 'Venom'], classes = ['Striker', 'Caster', 'Conjurer']; const newBeast = { id: 'c' + Date.now(), class: classes[Math.floor(Math.random() * 3)], element: elements[Math.floor(Math.random() * 4)], starLevel: 1, workPower: 5 }; addBeast(newBeast); renderGrid(); renderWorkstation(); showToast(`🎉 获得 ${CLASS_ICONS[newBeast.class]} ${ELEMENT_ICONS[newBeast.element]}!`); }
        function startRun() { const allBeasts = [...gameState.grid.filter(b => b), ...gameState.workstation.filter(b => b)]; if (allBeasts.length === 0) { showToast('⚠️ 没有可用幻兽!'); return; } const selected = allBeasts.sort((a, b) => b.starLevel - a.starLevel)[0]; gameState.player = { class: selected.class, element: selected.element, starLevel: selected.starLevel, maxHp: 100 + selected.starLevel * 100, currentHp: 100 + selected.starLevel * 100, baseAttack: 15 + selected.starLevel * 10, skills: [], equipments: [], effects: [] }; gameState.inRun = true; gameState.currentStage = 1; els.homeScene.classList.remove('active'); els.battleScene.classList.add('active'); els.playerAvatar.textContent = CLASS_ICONS[gameState.player.class]; els.battleLog.innerHTML = '<div class="log-entry">⚔️ 战斗开始!</div>'; startStage(); }
        function startStage() { const stage = gameState.currentStage; if ([1, 4, 7].includes(stage)) { showDraft(); return; } if ([2, 3, 6, 9].includes(stage)) { gameState.player.equipments.push({ name: '随机装备', type: 'attack_boost', value: 5 }); log('📦 获得掉落: 攻击力 +5', 'log-status'); gameState.currentStage++; setTimeout(startStage, 1000); return; } if ([5, 8].includes(stage)) { showMerchant(); return; } startBattle(); }
        function generateEnemy(stage) { const growth = Math.pow(1.3, stage - 1); const isBoss = stage === 10; let hp = Math.floor(80 * growth), atk = Math.floor(8 * growth); if (isBoss) hp *= 2; const affixes = []; const affixPool = ['armored', 'thorns', 'regen', 'berserk']; let count = 0; if (stage >= 4 && stage <= 6) count = 1; else if (stage >= 7 && stage <= 9) count = 2; else if (stage === 10) count = 3; for (let i = 0; i < count; i++) affixes.push(affixPool[Math.floor(Math.random() * 4)]); const elements = ['Fire', 'Ice', 'Thunder', 'Venom'], classes = ['Striker', 'Caster', 'Conjurer']; return { class: classes[Math.floor(Math.random() * 3)], element: elements[Math.floor(Math.random() * 4)], starLevel: Math.min(5, 1 + Math.floor(stage / 3)), maxHp: hp, currentHp: hp, baseAttack: atk, skills: [], equipments: [], effects: [], isBoss, eliteAffixes: affixes }; }
        function startBattle() { gameState.enemy = generateEnemy(gameState.currentStage); els.enemyAvatar.textContent = gameState.enemy.isBoss ? '👿' : '👹'; updateHpDisplay(); log(`👹 遭遇 ${gameState.enemy.isBoss ? 'BOSS' : '敌人'}! 词条: [${gameState.enemy.eliteAffixes?.join(', ') || '无'}]`, 'log-status'); let tick = 0; gameState.battleInterval = setInterval(() => { tick++; processBattleTick(tick); if (gameState.player.currentHp <= 0 || gameState.enemy.currentHp <= 0) { clearInterval(gameState.battleInterval); endBattle(); } }, 500); }
        function processBattleTick(tick) { const p = gameState.player, e = gameState.enemy; if (e.eliteAffixes?.includes('regen')) { const regen = Math.floor(e.maxHp * 0.02); e.currentHp = Math.min(e.maxHp, e.currentHp + regen); log(`💚 敌人恢复 ${regen} HP`, 'log-heal'); } if (tick % 2 === 1) { let dmg = p.baseAttack; p.equipments.forEach(eq => { if (eq.type === 'attack_boost') dmg += eq.value; }); if (e.eliteAffixes?.includes('armored')) { const orig = dmg; dmg = Math.floor(dmg * 0.7); log(`🛡️ 敌人护甲减免 ${orig}→${dmg}`, 'log-status'); } e.currentHp = Math.max(0, e.currentHp - dmg); log(`⚔️ 玩家攻击造成 ${dmg} 伤害`, 'log-damage'); if (e.eliteAffixes?.includes('thorns')) { const reflect = Math.floor(dmg * 0.1); p.currentHp = Math.max(0, p.currentHp - reflect); log(`🌵 反弹 ${reflect} 伤害`, 'log-damage'); } } else { let dmg = e.baseAttack; if (e.eliteAffixes?.includes('berserk') && e.currentHp / e.maxHp < 0.3) { dmg *= 2; log(`💀 敌人狂暴! 伤害翻倍!`, 'log-status'); } p.currentHp = Math.max(0, p.currentHp - dmg); log(`👹 敌人攻击造成 ${dmg} 伤害`, 'log-damage'); } updateHpDisplay(); }
        function updateHpDisplay() { const p = gameState.player, e = gameState.enemy; els.playerHpBar.style.width = (p.currentHp / p.maxHp * 100) + '%'; els.playerHpText.textContent = `${p.currentHp}/${p.maxHp}`; if (e) { els.enemyHpBar.style.width = (e.currentHp / e.maxHp * 100) + '%'; els.enemyHpText.textContent = `${e.currentHp}/${e.maxHp}`; } }
        function log(msg, className = '') { const entry = document.createElement('div'); entry.className = 'log-entry ' + className; entry.textContent = msg; els.battleLog.appendChild(entry); els.battleLog.scrollTop = els.battleLog.scrollHeight; }
        function endBattle() { if (gameState.player.currentHp > 0) { log('🎉 战斗胜利!', 'log-heal'); gameState.player.currentHp = Math.min(gameState.player.maxHp, gameState.player.currentHp + Math.floor(gameState.player.maxHp * 0.2)); if (gameState.currentStage === 10) { gameState.chests += 3; updateResources(); showResult(true, '通关成功!', '获得 3 个宝箱'); } else { gameState.currentStage++; setTimeout(startStage, 1000); } } else { log('💀 战斗失败!', 'log-damage'); showResult(false, '战斗失败', '再试一次吧'); } }
        function showDraft() { els.draftChoices.innerHTML = ''; const skills = ['火球术', '冰枪术', '雷击', '治疗术', '重击']; for (let i = 0; i < 3; i++) { const card = document.createElement('div'); card.className = 'choice-card'; card.innerHTML = `<div class="choice-icon">✨</div><div class="choice-name">${skills[Math.floor(Math.random() * 5)]}</div><div class="choice-desc">获得新技能</div>`; card.onclick = () => { gameState.player.skills.push({ name: '新技能', damage: 20 }); log('✨ 获得新技能!', 'log-skill'); els.draftModal.classList.remove('active'); gameState.currentStage++; setTimeout(startStage, 500); }; els.draftChoices.appendChild(card); } els.draftModal.classList.add('active'); }
        function showMerchant() { els.draftChoices.innerHTML = ''; const items = [{ name: '生命护符', icon: '❤️', desc: 'HP +50', cost: 100 }, { name: '力量之剑', icon: '⚔️', desc: 'ATK +10', cost: 100 }, { name: '吸血鬼之牙', icon: '🦷', desc: '吸血 10%', cost: 150 }]; items.forEach(item => { const card = document.createElement('div'); card.className = 'choice-card'; card.innerHTML = `<div class="choice-icon">${item.icon}</div><div class="choice-name">${item.name}</div><div class="choice-desc">${item.desc}</div><div class="choice-cost">${item.cost}💰</div>`; card.onclick = () => { if (gameState.gold >= item.cost) { gameState.gold -= item.cost; updateResources(); log(`💎 购买 ${item.name}`, 'log-skill'); els.draftModal.classList.remove('active'); gameState.currentStage++; setTimeout(startStage, 500); } else { showToast('💰 金币不足!'); } }; els.draftChoices.appendChild(card); }); els.draftModal.classList.add('active'); }
        function showResult(win, title, rewards) { els.resultIcon.textContent = win ? '🏆' : '💀'; els.resultTitle.textContent = title; els.resultRewards.textContent = rewards; els.resultModal.classList.add('active'); }
        function returnHome() { gameState.inRun = false; gameState.currentStage = 0; gameState.player = null; gameState.enemy = null; els.battleScene.classList.remove('active'); els.homeScene.classList.add('active'); els.resultModal.classList.remove('active'); }
        document.getElementById('btn-open-chest').addEventListener('click', openChest);
        document.getElementById('btn-start-run').addEventListener('click', startRun);
        document.getElementById('btn-reroll').addEventListener('click', () => { if (gameState.gold >= 50) { gameState.gold -= 50; updateResources(); showToast('🔄 刷新成功!'); els.draftModal.classList.remove('active'); setTimeout(() => showDraft(), 100); } else { showToast('💰 金币不足!'); } });
        document.getElementById('btn-return-home').addEventListener('click', returnHome);
        // 初始放入2个幻兽
        gameState.grid[12] = { id: 'b1', class: 'Caster', element: 'Fire', starLevel: 1, workPower: 5 };
        gameState.grid[13] = { id: 'b2', class: 'Striker', element: 'Ice', starLevel: 1, workPower: 5 };
        renderGrid(); renderWorkstation(); updateResources();
        console.log('🎮 幻兽工坊与远征 - 游戏已启动');
    })();
    </script>
</body>
</html>
