<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻兽工坊与远征</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; overflow-x: hidden; }
        .resource-bar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; gap: 40px; z-index: 100; border-bottom: 2px solid #e94560; }
        .resource-item { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: bold; }
        .resource-icon { font-size: 24px; }
        .scene { display: none; padding-top: 80px; min-height: 100vh; }
        .scene.active { display: block; }
        #home-scene { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .home-title { text-align: center; font-size: 32px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(233, 69, 96, 0.5); }
        .grid-container { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .grid-label { text-align: center; margin-bottom: 15px; font-size: 14px; color: #aaa; }
        .beast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; }
        .grid-cell { aspect-ratio: 1; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; position: relative; }
        .grid-cell:hover { background: rgba(255,255,255,0.15); border-color: rgba(233, 69, 96, 0.5); }
        .grid-cell.drag-over { background: rgba(233, 69, 96, 0.3); border-color: #e94560; }
        .beast-card { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(233,69,96,0.3), rgba(0,212,170,0.3)); border-radius: 10px; font-size: 24px; cursor: grab; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .beast-card.dragging { opacity: 0.5; }
        .beast-star { position: absolute; top: 2px; right: 2px; font-size: 12px; color: gold; }
        .beast-element { position: absolute; bottom: 2px; left: 2px; font-size: 12px; }
        .element-Fire { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .element-Ice { background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .element-Thunder { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #333; }
        .element-Venom { background: linear-gradient(135deg, #55efc4, #00b894); }
        .workstation-container { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 100px; }
        .workstation-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .work-slot { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .work-slot.drag-over { background: rgba(0,212,170,0.3); border-color: #00d4aa; }
        .power-display { position: absolute; bottom: -25px; font-size: 12px; color: #00d4aa; width: 100%; text-align: center; }
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; gap: 20px; border-top: 2px solid #e94560; z-index: 100; }
        .btn { padding: 15px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #c73e54); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233, 69, 96, 0.5); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: linear-gradient(135deg, #00d4aa, #00b894); color: white; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 212, 170, 0.5); }
        #battle-scene { padding: 20px; max-width: 800px; margin: 0 auto; }
        .stage-display { text-align: center; font-size: 24px; margin-bottom: 20px; color: #e94560; }
        .battle-arena { display: flex; justify-content: space-between; align-items: center; padding: 40px 20px; background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 20px; }
        .combatant { text-align: center; width: 150px; }
        .combatant-avatar { font-size: 60px; margin-bottom: 10px; }
        .hp-bar-container { width: 100%; height: 20px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .hp-bar { height: 100%; background: linear-gradient(90deg, #00d4aa, #00b894); transition: width 0.3s; }
        .hp-bar.enemy { background: linear-gradient(90deg, #e94560, #c73e54); }
        .hp-text { font-size: 14px; margin-bottom: 5px; }
        .status-icons { display: flex; justify-content: center; gap: 5px; font-size: 18px; min-height: 24px; }
        .summon-display { font-size: 12px; color: #00d4aa; margin-top: 5px; }
        .vs-text { font-size: 48px; font-weight: bold; color: #e94560; }
        .battle-log { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 14px; line-height: 1.8; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .log-entry:last-child { border-bottom: none; }
        .log-damage { color: #ff6b6b; } .log-heal { color: #00d4aa; } .log-skill { color: #74b9ff; } .log-status { color: #ffeaa7; }
        .log-summon { color: #a29bfe; } .log-passive { color: #fd79a8; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 30px; max-width: 600px; width: 90%; border: 2px solid #e94560; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-title { text-align: center; font-size: 24px; margin-bottom: 20px; color: #e94560; }
        .choice-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .choice-card { background: rgba(255,255,255,0.1); border: 2px solid transparent; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .choice-card:hover { border-color: #e94560; transform: translateY(-5px); }
        .choice-icon { font-size: 36px; margin-bottom: 10px; }
        .choice-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .choice-desc { font-size: 12px; color: #aaa; }
        .choice-cost { margin-top: 10px; color: #ffeaa7; font-weight: bold; }
        .modal-actions { display: flex; justify-content: center; gap: 15px; }
        .result-modal { text-align: center; }
        .result-icon { font-size: 80px; margin-bottom: 20px; }
        .result-title { font-size: 32px; margin-bottom: 15px; }
        .result-rewards { font-size: 18px; color: #ffeaa7; margin-bottom: 20px; }
        .synergy-banner { background: linear-gradient(90deg, #e94560, #ff6b6b, #e94560); padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .synergy-text { font-size: 18px; font-weight: bold; color: #fff; }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 15px 30px; border-radius: 30px; z-index: 2000; animation: fadeInOut 2s; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, -20px); } 20% { opacity: 1; transform: translate(-50%, 0); } 80% { opacity: 1; } 100% { opacity: 0; } }
        @media (max-width: 600px) { .beast-grid { gap: 5px; } .choice-container { grid-template-columns: 1fr; } .battle-arena { flex-direction: column; gap: 20px; } .vs-text { transform: rotate(90deg); } }
    </style>
</head>
<body>
    <div class="resource-bar">
        <div class="resource-item"><span class="resource-icon">💰</span><span id="gold-display">0</span></div>
        <div class="resource-item"><span class="resource-icon">🎁</span><span id="chests-display">0</span></div>
    </div>

    <div id="home-scene" class="scene active">
        <h1 class="home-title">🏰 幻兽工坊</h1>
        <div class="grid-container">
            <div class="grid-label">📦 仓库 (拖拽合成: 3个相同幻兽可升星)</div>
            <div class="beast-grid" id="beast-grid"></div>
        </div>
        <div class="workstation-container">
            <div class="grid-label">⚒️ 打工槽位 (产出金币)</div>
            <div class="workstation-grid" id="workstation-grid"></div>
        </div>
    </div>

    <div id="battle-scene" class="scene">
        <div class="stage-display" id="stage-display">Stage 1/10 - 战斗</div>
        <div class="synergy-banner" id="synergy-banner" style="display:none;">
            <div class="synergy-text">🎉🎉🎉 【羁绊共鸣】进化成功!!! 🎉🎉🎉</div>
        </div>
        <div class="battle-arena">
            <div class="combatant">
                <div class="combatant-avatar" id="player-avatar">🧙‍♂️</div>
                <div class="hp-bar-container"><div class="hp-bar" id="player-hp-bar" style="width: 100%"></div></div>
                <div class="hp-text" id="player-hp-text">100/100</div>
                <div class="status-icons" id="player-status"></div>
                <div class="summon-display" id="player-summon"></div>
            </div>
            <div class="vs-text">VS</div>
            <div class="combatant">
                <div class="combatant-avatar" id="enemy-avatar">👹</div>
                <div class="hp-bar-container"><div class="hp-bar enemy" id="enemy-hp-bar" style="width: 100%"></div></div>
                <div class="hp-text" id="enemy-hp-text">100/100</div>
                <div class="status-icons" id="enemy-status"></div>
            </div>
        </div>
        <div class="battle-log" id="battle-log"><div class="log-entry">⚔️ 战斗准备就绪...</div></div>
    </div>

    <div class="action-bar" id="action-bar">
        <button class="btn btn-secondary" id="btn-open-chest">🎁 开宝箱</button>
        <button class="btn btn-primary" id="btn-start-run">⚔️ 开始远征</button>
        <button class="btn btn-secondary" id="btn-idle" style="display:none;">⏳ 挂机产出</button>
    </div>

    <div class="modal-overlay" id="draft-modal">
        <div class="modal">
            <div class="modal-title">🎴 选择一个奖励</div>
            <div class="choice-container" id="draft-choices"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-reroll">🔄 刷新 (50金)</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal result-modal">
            <div class="result-icon" id="result-icon">🏆</div>
            <div class="result-title" id="result-title">胜利!</div>
            <div class="result-rewards" id="result-rewards">获得 3 个宝箱</div>
            <button class="btn btn-primary" id="btn-return-home">返回工坊</button>
        </div>
    </div>

    <script type="module" src="/main.ts"></script>
</body>
</html>
